name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Syntax check
        run: |
          python -m py_compile \
            app/builder.py \
            src/core/ai.py \
            src/core/config.py \
            src/core/doctor.py \
            src/core/notify.py \
            src/core/security.py \
            src/core/state.py \
            src/contrib/contribution_engine.py \
            src/contrib/contribution_store.py \
            src/contrib/opportunity_engine.py \
            src/contrib/pr_engine.py \
            src/contrib/pr_generator.py \
            src/analysis/repo_intelligence.py \
            src/github/fork.py \
            src/github/scraper.py \
            src/platform/mcp_install.py \
            src/platform/openclaw_install.py \
            src/contribution_mcp/server.py

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m unittest discover -s tests -v
